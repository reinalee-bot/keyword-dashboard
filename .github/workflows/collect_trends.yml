name: 트렌드 데이터 일일 수집

on:
  schedule:
    # 매일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * *'
  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 트렌드 데이터 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          cd keyword-dashboard 2>/dev/null || true
          python collector.py

      - name: 변경된 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음, 커밋 생략"
          else
            git commit -m "데이터 업데이트 $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
