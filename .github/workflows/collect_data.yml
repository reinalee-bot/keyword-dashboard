name: 📊 키워드 데이터 자동 수집

on:
  schedule:
    # 매일 오전 9시 KST (= UTC 00:00) 자동 실행
    - cron: '0 0 * * *'

  # GitHub 화면에서 직접 실행 버튼도 활성화 (테스트용)
  workflow_dispatch:

permissions:
  contents: write   # CSV 파일을 저장소에 커밋하기 위한 권한

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 저장소 코드 받아오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 환경 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 필요한 패키지 설치
      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 4. 데이터 수집 실행
      #    네이버 API 키는 GitHub Secrets에서 불러옴 (.env 파일 불필요)
      #    구글 트렌드는 가끔 차단될 수 있어 continue-on-error 설정
      - name: 데이터 수집 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collector.py
        continue-on-error: true

      # 5. 새 데이터가 있으면 GitHub에 커밋·푸시
      - name: 변경된 CSV 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.csv
          if git diff --staged --quiet; then
            echo "새로 수집된 데이터 없음 — 커밋 건너뜀"
          else
            git commit -m "자동 수집: $(date +'%Y-%m-%d') (네이버·구글 트렌드)"
            git push
            echo "✅ 새 데이터 GitHub에 저장 완료"
          fi
