# ── 모호한 단어 (문맥 검증 필요) ───────────────────
# valid_context: 이 단어들 중 하나라도 함께 있어야 유효한 매칭으로 처리
# invalid_context: 이 단어들이 있으면 매칭을 무효화 (부분 단어 방지 포함)
ambiguous_terms:
  장애:
    valid_context:
      - 서비스 장애
      - 시스템 장애
      - 네트워크 장애
      - 서버 장애
      - 클라우드 장애
      - 보안 장애
      - IT 장애
      - 장애 발생
      - 장애 복구
      - 장애 원인
      - 장애 조치
    invalid_context:
      - 장애인
      - 발달장애
      - 지체장애
      - 장애우
      - 장애 예술
      - 장애 학생
      - 장애아
      - 직업재활
      - 장애인복지
      - 복지관
  예산:
    valid_context:
      - IT 예산
      - 보안 예산
      - 기업 예산
      - 솔루션 예산
      - SW 예산
      - 소프트웨어 예산
      - 클라우드 예산
      - 라이선스 예산
      - 도입 예산
      - 구매 예산
    invalid_context:
      - 국가 예산
      - 정부 예산
      - 지자체 예산
      - 지방 예산
      - 지방자치
      - 복지 예산
      - 교육 예산
      - 국방 예산
      - 추경
  규제:
    valid_context:
      - AI 규제
      - 보안 규제
      - 데이터 규제
      - 개인정보 규제
      - 클라우드 규제
      - 컴플라이언스
      - 규제 준수
      - 규제 대응
      - 보안 법규
      - GDPR
      - ISMS
    invalid_context:
      - 환경 규제
      - 건설 규제
      - 식품 규제
      - 의약품 규제
      - 농업 규제
      - 금융 규제
      - 부동산 규제
  비용:
    valid_context:
      - 라이선스 비용
      - IT 비용
      - 솔루션 비용
      - 도입 비용
      - 구축 비용
      - 운영 비용
      - 클라우드 비용
      - 소프트웨어 비용
      - 구독 비용
      - SaaS 비용
    invalid_context:
      - 의료비용
      - 치료 비용
      - 수술 비용
      - 건설 비용
      - 공사 비용
      - 여행 비용
      - 생활 비용

