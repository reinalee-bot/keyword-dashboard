# ════════════════════════════════════════════════════
# SCK 뉴스 관련성 판정 설정
# ════════════════════════════════════════════════════
# 사용법
#   항목 추가: "  - 새항목" 줄을 원하는 그룹 아래 추가
#   항목 삭제: 해당 줄을 지우거나 앞에 # 을 붙임
#   저장 후 대시보드를 새로고침하면 즉시 반영됩니다.
# ════════════════════════════════════════════════════

# ── 검색어 분류 ───────────────────────────────────────
# 각 검색어가 어떤 유형의 쿼리인지 지정
# broad_topic: 광범위한 IT/AI 주제어 → 기업 영향 맥락 필수
# vendor: 특정 벤더/제품명 → 벤더가 기사 주체일 때만 높음
# competitor: 경쟁사명 → 기존 경쟁사 로직 적용
query_types:
  broad_topic:
    - AI
    - AX
  vendor:
    - Microsoft
    - Adobe
  competitor:
    - 디모아

# ── 자사 및 관계사 ────────────────────────────────────
# 이름이 등장하는 기사는 무조건 최고 관련성(90점)으로 처리
owned_entities:
  - SCK
  - STK
  - SCK커뮤니케이션
  # 추가 관계사 이름을 아래에 작성하세요

# ── 경쟁사 ───────────────────────────────────────────
# 제목에 있으면 높음(80), 본문에 여러 번 나오면 보통(55),
# 본문에 한 번만 등장하면 보통/낮음(35)
competitor_entities:
  - 디모아
  - dimoa

# ── 주요 벤더 (제품명 포함) ──────────────────────────
# 이름만으로는 점수를 높이지 않음
# enterprise_impact 맥락이 함께 있을 때만 가점
vendor_entities:
  - Microsoft
  - 마이크로소프트
  - Azure
  - Copilot
  - Teams
  - M365
  - Office 365
  - Adobe
  - 어도비
  - Creative Cloud
  - Document Cloud
  - LinkedIn
  - 링크드인
  - Google Workspace
  - 구글 워크스페이스
  - Slack
  - Salesforce
  - SAP
  - ServiceNow
  - Zoom
  - Atlassian
  - Jira

